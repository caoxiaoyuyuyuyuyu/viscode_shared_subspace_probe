  summary: D008 Reviewer 八审硬化：硬截止绝对 UTC + N=18 power gate + permutation null + Stage
    E freeze + 磁盘重算 + N=12 切 qualitative
  rationale: Reviewer 八审给出 2 critical + 7 warning，全部合理。修复：(C1 硬截止) v6 文档把 "T+0' 重置"
    与 "原 60h 不变" 两种基准混用造成二义。修复方法：硬截止固定为 2026-04-13 03:00 UTC（D001 立项 15:01 UTC + 60h），所有
    T+ 一律绝对 UTC。剩 ~57h，v7 倒排表 49h 工作量 + 8h buffer。 (C2 N=18 power confound) decoupling
    primary 后审稿人必问 "是 underpowered artifact 还是真 decoupling"。修复：A1 跑 ρ_true ∈ {0.1,0.3,0.5}
    下 1000-trial detection power simulation，Results 段必须同时报 CI + power；A2 permutation
    test：shuffle format-pair label 1000 次重算 ρ，decoupling 声明硬条件改为 "(CI 含 0) 且 (observed
    ρ 落在 null 分布 10-90 percentile 中段)"，单纯 CI 含 0 不足以声明 decoupling。 (W1 磁盘 80G > 79G)
    v6 把 vLLM kv cache 错算成磁盘 + datasets 低估 + 没算 hidden state outputs。修复：Stage B 不做
    hidden state 全量磁盘 dump，probe 拟合 in-memory，只存 probe 系数矩阵；datasets 估 18G；总 ~69G
    + 10G headroom。 (W2 Stage E data reuse) Qwen2.5-Coder 既是 headline ρ 成员又是 Stage
    E QLoRA target。修复 A3：Stage E 跑前 freeze pre-intervention probe 系数 + ρ raw + CI
    到 outputs/frozen_snapshot/，QLoRA 后用 post 模型重跑独立存。 (W4 sanity 2h 窗口紧) sanity +
    mini pilot + sbert + CLIPScore SNR + 审批合并到 04-10 22:00→04-11 01:00 的 3h 窗口。 (W5
    残缺 cache resume hash mismatch) 重下 Qwen2.5-Coder 和 VisCoder2 前必须 rm 所有 cache 目录（含
    hub/）。 (W6 hf-mirror 不稳) 并行下载 + fallback HF_ENDPOINT 到 huggingface.co + source
    /etc/network_turbo。 (W7 N=12 fallback 未 pre-register) A4：触发 04-11 04:00 砍 Qwen2.5-Coder
    时 narrative 立即切 qualitative case study + small-N observation，禁止 predictivity claim，这是
    pre-registered 切换不是事后选择。registry 污染（W3）交给 Agent 在 verification 阶段并行 read_registry
    sanity check。
