- id: D058
  date: 2026-04-13 14:06 UTC
  summary: 'D058-draft: C1 python-neg pass criterion pre-registered before v4 CKPT'
  rationale: '[DRAFT — pending Director approval before v4 CKPT lands]


    Pre-register C1 python-negative-control pass criterion BEFORE v4 hardened produces
    its first CKPT, to prevent post-hoc criterion fitting (反 D028 类事后拟合) and preempt
    reviewer attack surface on selective reporting.


    ## Pass criterion (all three clauses must hold)


    **M1 — CKA magnitude gap (primary)**: For every (model, layer) cell in the tested
    common subset, `CKA(python_pair) < 0.5 × CKA(visual_pair_mean)`. Reported as gap
    ratio per cell.


    **M2 — A2 statistical separation**: python–visual pair permutation p-values >
    0.05 (fail-to-reject null) AND visual-visual pair p-values < 0.001 at n_perm=5000
    for compliant models. For the 5 models still at iterative n_perm=500 (see D054
    gap: only Qwen2.5-Coder has iterative n_perm=5000; DeepSeek/VisCoder2/Qwen25/Codestral/StarCoder2
    are at n_perm=500), the visual-pair threshold is p ≤ 0.002 (smallest achievable
    at n=500) not p<0.001 — this must be labelled explicitly in the results table.


    **M3 — Model coverage**: ≥ 3 models from {Qwen2.5-Coder, VisCoder2, Qwen2.5-base}
    must satisfy M1 + M2. Layers restricted to the minimum common subset used by the
    visual cross-format experiment (7 equidistant layers).


    ## Edge-case reporting rule (anti-spin)

    If any cell has `CKA(python_pair) ∈ [0.8 × CKA(visual_pair), 1.2 × CKA(visual_pair)]`,
    the entire C1 test is reported as "C1 did not pass" regardless of M2/M3 status.
    No narrative framing may recover a pass in this band. The cell must appear in
    the results table with the ratio printed.


    ## Why this specific criterion

    - 0.5× threshold in M1 is strict enough that a random generic-code similarity
    baseline cannot pass, while loose enough that residual code-structure similarity
    does not auto-fail.

    - M2 mirrors the existing A2 framework reviewers already accepted in D054, minimizing
    new methodology to defend.

    - The edge-case clause forestalls a reviewer reading us as spinning a marginal
    failure as "directional evidence".

    - Pre-registration timestamp must precede v4 hardened''s first per-layer ckpt_python_neg.txt
    write; commit to decisions.yaml with status=draft suffices for provenance.


    ## Approval gate

    Director flips rationale header from "[DRAFT — pending…]" to "[APPROVED YYYY-MM-DD]"
    before v4 CKPT lands. If v4 produces data before approval, the criterion is frozen
