- id: D019
  date: 2026-04-10 23:03 UTC
  summary: 'D019: Reviewer 15 审 critical → N=12 power simulation 必跑 + decoupling claim
    在 N=12 下完全禁止 + N=18 重定位为 "exploratory with contamination floor" 非 robustness check
    + 投稿目标降级'
  rationale: 'Reviewer 15 审针对 v11 ROADMAP（D015/D016/D017 后状态）给出 2 critical + 4 warning，其中
    critical 已是 D008 早期硬条件被 A4 激活后疏漏。


    **C1: N=12 power simulation 缺失（违反 D008 C2 硬条件）**

    - D008 C2 原文："A1 跑 ρ_true ∈ {0.1,0.3,0.5} 下 1000-trial detection power simulation，Results
    段必须同时报 CI + power"

    - 已知 N=18 power: 0.218/0.435/0.591；N=12 估保守 ≈ 0.13/0.30/0.40

    - A1 必须扩展为双跑（N=12 + N=18），ROADMAP "Stage B" 任务里加这条

    - 不可省


    **C2: N=12 decoupling claim 完全禁止（避免 "power 不足必然满足判据" 陷阱）**

    - D013 判据：|ρ|<0.3 ∧ CI⊃0 ∧ observed ρ < null 90th

    - N=12 下 bootstrap CI 极宽 → CI⊃0 几乎一定满足；permutation null variance 大 → ρ<90th 也几乎一定满足

    - 后果：N=12 decoupling 变成"数据必然结果"而非"实证观察"，违背 D013 "absence of evidence ≠ evidence
    of absence"

    - 修复：v3.4 §9 + §10 deviation policy 明文写"N=12 下 decoupling claim 完全禁止"，等效于在判据上加
    "power ≥ 0.5 hard gate"

    - N=12 论文叙事仅做 qualitative observation + framework contribution，不做任何 quantitative
    decoupling claim


    **W3: N=18 auxiliary 重定位**

    - 原 D016 把 N=18 写为"含 VisCoder2 的 contamination-aware auxiliary 报告"，暗示是 N=12 robustness
    check

    - 但 N=18 auxiliary 中 VisCoder2 的 Asy 相关 2 cells (Asy→X / X→Asy) 仍受 VCM-asy memorization
    污染（即使 D018 把 probe pool TikZ 改回 vTikZ+DaTikZv2，Asy probe 仍是 VCM-asy）

    - 已知污染的"robustness check"信息价值≈0

    - 修复：v3.4 §9 把 N=18 重定位为 "full-model exploratory view with known memorization
    floor on Asy/TikZ for VisCoder2"，明文取消其 "N=12 robustness check" 角色

    - 论文 Discussion 用 N=12 vs N=18 的 ρ 差异作为 contamination effect 的直接量化证据，而不是 robustness
    验证


    **W2: 投稿目标降级（Director 裁决）**

    - 原目标：NeurIPS 2026 / EMNLP 2026 main conference

    - N=12 现状：2 个同家族 Qwen2.5 模型（Coder vs base）= 更像 family ablation，不是 cross-model
    subspace 分析

    - Reviewer 评估：top venue main conference acceptance 风险高，建议 EMNLP findings / ACL
    workshops / NeurIPS workshops on mechanistic interpretability

    - **Director 裁决（Auto Research mode）**：接受降级。继续按 D018 Path A 推进 N=12 case study
    + framework contribution，**主投目标改为 EMNLP findings / NeurIPS MI workshop**，主会作 stretch
    target 但不强求。理由：(a) 48h 预算内补第 4 模型 (DeepSeek-Coder/StarCoder) 不可行（数据下载 + 模型 setup
    + 烟测 + 全量生成 ~10-15h，吃光 buffer）；(b) framework + qualitative finding 在 workshop
    是 strong contribution；(c) 降级后写作压力小，可深挖 limitations + reproducibility，反而加分；(d)
    post-deadline 可以补第 4 模型作 v2 投主会

    - 论文写作 framing：从 "predictive visual program subspace" → "framework + Qwen2.5 family
    case study"

    - abstract / intro / conclusion 全部按 case study 框架重写


    **W1 & W4 处理**：W1 (SVGX-Core × Qwen2.5 audit) 已被 D018 Phase 3 覆盖（4 个独立 audit 中的一个）。W4
    (Stage A 预算 5h → 7h) 接受调整，论文写作 24h → 22h，buffer 11h → 11h（实际更紧但可控）。


    **I3 D017 fallback 路径确认**：D017 完整 fallback = "若 50k sample + caption norm 后仍不达
    500 triples ≥0.7，按 v3.3 §3-quater 缩 pool（不降门槛），允许接受 N<500 + 正式 log_decision；若
    N<400 则升级为 critical 由 Director 决策"。这与 v3.3 §3-quater "the pool is shrunk and recorded
    in decisions.yaml rather than the threshold lowered" 完全对齐。


    **v3.4 必须新增条款（D019 → P2 update）**：

    - §9 N=12 narrative 全改 case study 框架

    - §10 deviation policy 加 "N=12 下 decoupling claim 完全禁止" + "N=18 不得作为 N=12 robustness
    check 论述"

    - §3-bis-2 probe pool contamination 表（D018 已规划）

    - §11 venue 降级声明（投 EMNLP findings / workshop）


    related: D008 C2, D013, D016, D018 + Reviewer 15 审 critical</rationale>

