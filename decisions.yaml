- id: D015
  date: 2026-04-10 22:53 UTC
  summary: 'D015: Eval pool 数据源替换 SVGenius/VisPlotBench → SVGX-Core/DaTikZ-test/VCM-hybrid
    + 训练污染披露'
  rationale: 'D003 原 spec eval pool = SVGenius/vTikZ/VisPlotBench test split。Stage
    A Step 1 datasets 下载后发现 (i) SVGenius 无 caption 字段无法作 eval prompt；(ii) VisPlotBench
    SVG 65 / Asymptote 92 远不足 spec 200/format。worker_research_visplot_contamination_prereg
    调研后建议替换为：SVG = VPB 65 + VCM-SVG 135 / TikZ = DaTikZ v1 test 200 / Asy = VPB 92
    + VCM-Asy 108。


    contamination 评估：VisCode-Multi-679K 由 the-stack-v2 246K + CoSyn-400K 323K + StarVector
    svg-diagrams 44K 组成。VisCoder2-7B = Qwen2.5-Coder-7B-Instruct SFT on VCM（同 owner
    TIGER-Lab 官方 declared）→ VisCoder2 对 VCM 三子集 contamination 全部 HIGH。Qwen2.5-Coder
