  date: 2026-04-13 14:20 UTC
  summary: 'D060 FROZEN (supersedes D058-draft): C1 negative control pass criterion
    (pre-registration)'
  rationale: '[FROZEN 2026-04-13T14:25Z by Director, supersedes D058-draft]


    Pre-registered pass criterion for C1 negative control (python-pair CKA as negative
    baseline vs visual-pair CKA). Must be evaluated BEFORE seeing v5 GPU rerun data.
    Original draft from rebuttal preflight worker (2026-04-13T14:06Z) had approval
    gate "If v4 produces data before approval, criterion is frozen as-stated retroactively".
    v4 only produced traceback (no CKA data), so retroactive-freeze trigger did not
    fire; Director explicitly freezes now before next data event.


    **M1 (magnitude)**: For each (model, layer) pair in the evaluation set, CKA(python-python)
    < 0.5 × CKA(visual-visual). Strictly per-pair, no averaging.


    **M2 (significance)**: A2 permutation test must yield:

    - python pairs: p > 0.05 (cannot reject null of random permutation equivalence)

    - visual pairs: p < 0.001 for n_perm=5000 models (Coder), **p ≤ 0.002 for n_perm=500
    models** (VisCoder2, DeepSeek, Qwen2.5-base, Codestral, StarCoder2 — smallest
    achievable at 1/(500+1) ≈ 0.002). Paper A2 table MUST label these 5 models as
    p ≤ 0.002 not p < 0.001.


    **M3 (coverage)**: At least 3 models must pass M1 AND M2 jointly, with {Coder,
    VisCoder2, Qwen2.5} as the minimum required subset (smallest common with visual
    case study).


    **Edge case (anti-spin clause)**: If python CKA ∈ [0.8×, 1.2×] × visual CKA (i.e.,
    within 20% of visual baseline), entire C1 result is declared FAIL regardless of
    M2 significance. No narrative recovery via "python baseline slightly elevated
    but still significantly different" type spinning is permitted.


    **Revision policy**: If post-hoc evidence justifies adjustment, must be recorded
    as D058.1 revision (independent decision entry), never edited in-place. Audit
    trail preserved.


    **Scope**: Applies to v5 GPU rerun output (exp_id p1_python_neg_v5_gpu) and any
    future python-negative control produced for this paper. Does NOT apply retroactively
    to v1/v2/v3/v4 hardened runs (all failed pre-data).'
