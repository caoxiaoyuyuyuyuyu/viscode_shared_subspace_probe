  rationale: Reviewer 七审揭示 stage0_env_setup 实质失败：(1) AutoDL 数据盘只有 79GB（不是几百 GB），当前
    100% 满；(2) Qwen3-Coder-30B-A3B fp16 体积 60GB，物理上无法与其他 4 模型 + CLIP/sbert/datasets
    共存于 79GB；(3) D006 替换 7B→30B-A3B 时未核算磁盘约束；(4) LLM4SVG snapshot 零 weights，且其本就在
    T+5h checkpoint 砍 trigger 上，烧光 Stage 0 时间预算后没必要重下；(5) 5 模型中 4 个未真实下载（VisCoder2/Qwen3-Coder/LLM4SVG
    snapshots 零 weights，Qwen2.5-Coder 残缺）。砍 Qwen3-Coder + LLM4SVG 后剩 3 visual+text
    models × 6 format pairs = N=18，decoupling narrative pre-registered 已自动成为 primary
    候选；这是 pre-registered 的 fallback path 不是 HARKing。GPU 预算从 24h 降到 ~19h 给 Stage 0
    重启留 5h slack。下载脚本路径 bug（v5 不写 hub/ 前缀导致 ~36G 重复目录）一并修。report.md 必须改成实测态（每个模型 from_pretrained
    烟测后才能写 ready）。
