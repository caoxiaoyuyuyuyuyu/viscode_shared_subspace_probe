- id: D017
  date: 2026-04-10 22:54 UTC
  summary: 'D017: SBERT cosine 门槛硬回 0.70，禁脚本静默降级，fallback 仅允许 ≥0.65/N=400 且必须 log_decision'
  rationale: 'Reviewer 十三审 critical (info 升级)：Stage A Step 2 sbert matching 在 logs/step2_sbert.log
    静默将 cosine 门槛从 0.7 降到 0.6（"Only 87 triples ≥ 0.7, trying 0.6..."），违反 D010 W_new3
    明文 "禁止静默降 cosine 门槛破坏 pre-register #3"。step2_report.json 实际 min cosine 0.6449，pilot
    triple 1/9 已经语义跨格式不同源（11:11 墙钟 vs 10:45 时钟，calendar grid vs meal planning），不构成有效
    paired-concept 三元组，会污染 Stage B linear probe fit。


    根因分析：

    (a) PROBE_EMBED_SAMPLE=10000 采样过小（SVG 250k 池仅采 3.9%, TikZ 49k 池采 20%），未榨干候选空间就降门槛；

    (b) caption 长度异构未归一化（asy caption 数百 token 远长于 SVG/TikZ），系统性拉低 cosine；

    (c) 脚本未对 cosine 门槛 raise，silent fallback 直接执行。


    修复硬约束（写入 scripts/step2_sbert_matching.py 重写）：

    1. cosine 门槛硬编码 0.70，不达 500 直接 raise SystemExit + 写错误到 step2_report.json，禁 silent
    fallback

    2. PROBE_EMBED_SAMPLE 提到至少 50000；Asy 池 22k 直接全用（不采样）

    3. caption 长度归一化：sbert tokenizer 统一截断到前 50 token

    4. 输出 step2_report.json 必须含 threshold (0.70 fixed) + n_triples + mean/median/min
    cos + embed pool sizes + 触发 raise 的 fallback 条件

    5. triple JSON 加 per-triple metadata：来源 dataset / 截断前后 caption / 三对 cosine


    Fallback 协议（仅修复后仍不达 500 才允许）：

    - 不接受降到 0.6

    - 允许降至 cosine ≥0.65 + N=400，但必须正式 log_decision (D018 或 patch D017) + 明写到 limitations

    - 不允许 silent fallback；任何降级必须在 worker callback 后由 Director 显式批准


    教训沉淀（项目 memory.md，由 Agent 落盘）：

    - 任何 pre-registered threshold/source 不得在脚本内静默降级，遇到不达标必须 raise + callback Director

    - Worker callback 内容看似空（"Acknowledged. No further action."）必须当 FAIL 信号，verify
    worker 兜底

    - Pre-reg 版本变更必须配对 log_decision，不能只 register pre_reg 不写决策</rationale>

