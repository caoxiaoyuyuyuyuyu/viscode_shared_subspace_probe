  date: 2026-04-13 22:10 UTC
  summary: 'D072: Tokenizer overlap baseline decision rule (pre-registered) — Spearman
    ρ 阈值决定 F3 改写方向'
  rationale: 'Tokenizer overlap baseline 启动前 freeze decision rule，避免 "看到数据再 framing"
    的 confirmation bias。


    规则：计算 6 format pairs 的 BPE token Jaccard vs mean CKA 的 Spearman rank correlation（across
    21 cells per model）。

    - ρ > 0.7 且 p < 0.01 → F3 改为 "tokenizer-level lexical confound"

