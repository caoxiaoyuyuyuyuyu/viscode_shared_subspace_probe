decisions:
- id: D001
  date: 2026-04-10 15:01 UTC
  summary: 立项阶段预注册锁定 7 点；加 Qwen2.5-7B base 作 text-only control
  rationale: Reviewer 立项审查指出 2 个 critical：(1) Stage D 的 Spearman ρ 若把 layer 拼入 N 会构成伪复制，正确
    N 应为 (model × format-pair)=24；(2) LLM4SVG 是单格式专家，其 ≈0 的极端点会单方面拉高 ρ 制造"几何预测行为"假象，必须从
    headline ρ 剔除，作为 qualitative control 单独呈现。另加 5 个 warning：paired-concept 抽样需用共享
    caption pool (方案 b) 避免 domain shift 混淆；behavioral metric 锁定 format validity +
    CLIPScore ViT-L/14；加 Qwen2.5-7B base 排除 "visual-specific subspace" null hypothesis；Stage
    E 限定 condensed scope 避免 cherry-pick；6 属性独立性声明克制。预算从 55→64 GPU-h，仍 ≤70。指令 Agent
    在 Stage A pilot 之前先产出 docs/pre_registration.md 交 Director 审批。
  related_experiments: []
  depends_on: []
- id: D002
  date: 2026-04-10 15:03 UTC
  summary: vLLM hidden-state hook 列为 P0 smoke test；锁定降 scope fallback 顺序；论文初稿目标降级
  rationale: Reviewer 二审指出两个新 critical：(1) 48h 倒排表多处 30-40% 时间压缩，wall clock 不可行；(2)
    整套时间线依赖 "Stage A 生成时同步 hook 中间层 residual stream" 这个 free lunch，但 vLLM PagedAttention/优化
    kernel 默认不暴露中间层 hidden state，HF transformers 路径吞吐 2-5× 慢会打穿预算。决策：(a) 派 vLLM hook
    smoke test 作为 GPU 上第一件事，结果出来前不放开 Stage A pilot；(b) 预先锁定降 scope 顺序：prompts 500→200
    → 砍 LLM4SVG → 砍 Qwen2.5-Coder-7B → layer 6→3 → Stage E 跳过；(c) 论文目标从 8-9 页 submission-ready
    降级为 "Results 表 + Method 段 + Abstract 草稿 + 关键图表"，48h 内交付。
  related_experiments: []
  depends_on:
  - D001
- id: D003
  date: 2026-04-10 15:07 UTC
  summary: 放弃 Stage A/B 合并 pass；eval pool 与 probe pool 严格分割；默认降 scope 到 200 prompts/格式
  rationale: Reviewer 三审抓到内在矛盾：原方案 "Stage A 生成时顺路 hook 缓存残差流给 Stage B" 要求两阶段用同一批 prompts，但预注册项
    3 又要 probe 用共享 caption pool、eval 用原始 HF 数据集，两者互斥。锁定 Reviewer 推荐的 (b) 变体：eval pool
    = SVGenius/vTikZ/VisPlotBench 的 test split，probe pool = 同数据集 train/dev split +
    sentence-BERT 跨格式匹配抽样，eval∩probe=∅，两次独立 generation pass。放弃"合并 pass 省一遍 forward"的假设。同时默认降
    scope prompts 500→200（两池都降），GPU 总量 ~26.4h，CPU 总量 ~10-17h，wall clock 估算 44-50h
    踩 48h 上限。进一步 fallback 顺序：砍 LLM4SVG → 砍 Qwen2.5-Coder-7B → layer 6→3 → 跳 Stage
    E。vLLM hook smoke test 维持 P0 地位，失败立即级联降 scope。
  related_experiments: []
  depends_on:
  - D001
  - D002
- id: D004
  date: 2026-04-10 15:09 UTC
  summary: Stage A 用 vLLM 生成 + Stage B 改用 HF transformers teacher-forcing；probe pool
    扩 200→500；mean-pool code tokens 代替 last-token
  rationale: Reviewer 四审 pre_registration v3 §3 抓到两个 critical + 两个 warning，修正方案同时解决四个问题：(1)
    CLIP 50-way 在 200 pool 下每类仅 2.8 样本，probe 被噪声淹没——pool 扩到 500；(2) Qwen2.5-7B base
    非 Coder 几乎无法生成合法 SVG/TikZ/Asymptote code，自由生成路径下 hidden state 混淆了"不会写代码"和"没有 visual
    subspace"两个假设——改用 teacher-forcing（caption, reference_code 对喂入，抽 code token 位置
    residual），"生成能力"与"表示能力"解耦；(3) "last-token residual" 歧义（prompt 最后 token？生成第一个？EOS？）——改
    mean-pool over code tokens；(4) vLLM hidden-state hook 可行性问题——Stage B 直接用 HF transformers
    原生 output_hidden_states=True，vLLM 只负责 Stage A 的 behavioral generation throughput，双工具栈分工各得其所。预算重算
    ~24 GPU-h GPU total + 14h CPU，wall clock ~40h 加论文 8h 够用，比之前 v3 的 26.4 GPU-h +
    踩 48h 反而更宽松（teacher-forcing 单 forward 远快于自回归生成）。这是经典 probing 文献（Hewitt & Manning,
    Belinkov）的标准做法，之前方案把 representation probing 和 behavioral evaluation 混在一起是根本错误。
  related_experiments: []
  depends_on:
  - D001
  - D002
  - D003
