- id: D059
  date: 2026-04-13 14:06 UTC
  summary: 'D059-draft: subsampling_stability v3 pass criterion pre-registered before
    pid4458 completes'
  rationale: '[DRAFT — pending Director approval before PID 4458 delivers data]


    Pre-register robustness pass criterion for subsampling_stability v3 (PID 4458)
    before it completes, to positively answer reviewer robustness attack surface and
    prevent post-hoc criterion fitting.


    ## Pass criterion (both clauses must hold)


    **R1 — per-n CKA variance bound**: For each sample-size level n ∈ {test set},
    across 5 random seeds, `std(CKA_seed_i) < 0.01` per (model, layer, format-pair)
    cell. Reported as max std and 95th-percentile std per model.


    **R2 — per-seed rank stability**: For each seed, Spearman rank correlation of
    (layer, format-pair) cells across adjacent n levels > 0.95. Equivalently, the
    ordinal structure of CKA values across layers/pairs must be preserved as n grows.


    Both R1 and R2 must hold on ≥ 3 models from the common subset.


    ## Why these specific thresholds

    - std < 0.01 absolute is tight enough to rule out "subsampling variance masquerading
    as signal" given measured CKA values of 0.08–0.15 (σ/μ < 13%).

    - Rank-corr > 0.95 is a qualitatively stronger statement than magnitude stability
    and defends against a reviewer arguing that the case-study ordering is noise-driven.

    - Both clauses together directly answer a generic robustness reviewer concern
    without requiring additional rebuttal methodology.


    ## Scope limits (pre-registered)

    Applies only to the subsampling_stability v3 run from PID 4458. Does not retroactively
    validate earlier subsampling attempts. If R1 or R2 fails for the Qwen25/StarCoder2
    cells (historically noisier), the failure is reported but does NOT block C1 /
    main-line paper — it is logged as a known robustness limitation in §Limitations.


    ## Approval gate

    Same as D058-draft: Director flips header to [APPROVED YYYY-MM-DD] before PID
    4458 data lands; if data lands first, criterion is frozen as-stated.


    [SUPERSEDED by D061 2026-04-13T14:25Z — Director direct freeze via log_decision.
    D061 is the canonical subsampling_stability robustness criterion; this draft retained
    for audit trail.]'
  related_experiments:
