- id: D062
  date: 2026-04-13 14:23 UTC
  summary: 'D062: D061 R1 pre-reg failed at n=100 coder L4 — acknowledged as finite-sample
    bias, scope unchanged (strict pre-reg discipline)'
  rationale: '[PRE-REG VIOLATION ACKNOWLEDGED — 2026-04-13T14:30Z by Director]


    D061 R1 threshold `std(CKA_seed) < 0.01 per (model, layer, format-pair) cell`
    was frozen at 14:25Z. Reviewer subsequently verified subsampling_stability_v3
    log (mtime 21:56 CST, predates the 22:10 hotplug kill) shows coder L4 at n=100
    has an observed std=0.0109 across 5 seeds for one format-pair, exceeding the 0.01
    threshold by ~9%. At larger n (150/200) std drops to 0.0076/0.0068 — the threshold
    is comfortably satisfied for n≥150.


    This cell constitutes a STRICT pre-reg failure for R1 under the frozen-as-stated
    text.


    **Decision**: Accept the R1 failure at n=100. DO NOT rewrite D061 R1 scope, DO
    NOT relax threshold, DO NOT add post-hoc "asymptotic regime" clause. The p-hacking
    attack surface of any scope modification after observing the failing data point
    is unacceptable for a paper already in rebuttal at 2.5/5.


    **Reasoning**:

    1. D061 was frozen by Director at 14:25Z using text from the rebuttal preflight
    worker draft that Director had not seen subsampling data for. Pre-reg integrity
    at freeze time is preserved.

    2. Subsampling v3 data existed physically (21:56 CST) but was not read by Director
    until Reviewer surfaced it post-freeze. Freeze-first-then-observe discipline is
    the correct boundary.

    3. Reinterpreting R1 scope to exclude n=100 ("D061 originally meant asymptotic
    regime") would be textbook post-hoc rationalization. Reviewer explicitly flagged
    this as forbidden path.

    4. The observed std=0.0109 is physically explained by finite-sample bias of HSIC:
    small n → higher variance of the CKA estimator. This is a well-known behavior
    (Song et al. 2012, Kornblith et al. 2019), and reporting it honestly in §Limitations
    STRENGTHENS the paper''s methodological credibility rather than weakening it.


    **Paper impact**:

    - §Robustness / §Limitations must add a paragraph stating: "R1 (per-cell std <
    0.01) is satisfied at n ≥ 150 across all tested (model, layer, format-pair) cells
    but fails at n=100 for at least one cell (coder L4, std=0.0109 vs threshold 0.01).
    We attribute this to finite-sample bias of the HSIC estimator and report n ≥ 150
    as the effective regime for our robustness claim."

    - Main robustness claim uses n ≥ 150 (three points: 150, 200, 252).

    - n=100 retained in supplementary as a stress-test data point.

    - NO narrative spin ("almost satisfies threshold", "approximately passes") permitted.


    **Dependencies**: D061 (unchanged). D063 (subsampling v4 spec) will incorporate
    this learning.


    **Scope**: Applies to subsampling v3 observed data AND future subsampling v4 rerun
    analysis. v4 rerun will use the same frozen D061 criterion; if v4 confirms n=100
    std ≥ 0.01 for multiple cells, this D062 acknowledgement carries forward unchanged.'
